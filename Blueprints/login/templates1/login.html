{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
{% endblock %}

{% block content %}

<div class="login-container">

<div class="login-produtos">

<div class="login-card">
<img src="{{ url_for('static', filename='img/smartwatch.jpg') }}">
<p>Smartwatch</p>
<p>R$ 299,90</p>
</div>

<div class="login-card">
<img src="{{ url_for('static', filename='img/fone.jpg') }}">
<p>Fone</p>
<p>R$ 199,90</p>
</div>

<div class="login-form">

<h2>Faça seu login</h2>

</form>

{% endblock %}
