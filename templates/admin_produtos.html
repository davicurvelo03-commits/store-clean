{% extends "base.html" %}

{% block content %}
<h2>Painel de Produtos</h2>

{% for p in produtos %}
<div style="border:1px solid #ccc; padding:10px; margin:10px">

<h3>{{ p.nome }}</h3>

<img src="{{ p.imagem }}" width="150">

<p>Preço: {{ p.preco }}</p>

<a href="/deletar/{{ p.id }}">Deletar</a>
 <button>Excluir produto</button>

</div>
{% endfor %}
{% endblock %}
