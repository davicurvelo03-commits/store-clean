{% extends "base.html" %}

{% block content %}

<div class="lista-produtos">

{% for produto in produtos %}

<div class="produto">

<h3>{{produto.nome}}</h3>

<p>{{produto.descricao}}</p>

<p>Preço: R$ {{produto.preco}}</p>

<p>Quantidade: {{produto.quantidade}}</p>

<img src="{{ url_for('static', filename=produto.imagem) }}" width="200">

</div>

{% endfor %}

</div>
    {% endfor %}
</div>
{% endblock %}
