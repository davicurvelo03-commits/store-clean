<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">

<title>Store Clean</title>
</head>

<body>

<header class="header">

<div class="logo">
<img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img">
</div>

<nav class="menu">
<a href="{{ url_for('login.login') }}">Login</a>
<a href="{{ url_for('registrar.registrar') }}">Registrar</a>
<a href="{{ url_for('compras.compras') }}">Produtos</a>
<a href="{{ url_for('registrar.registrar_produtos') }}">Registrar produtos</a>
</nav>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

</header>

{% block content %}
{% endblock %}

<script>
function toggleTheme(){
document.body.classList.toggle("dark")
}
</script>

</body>
</html>
